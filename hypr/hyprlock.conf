# /* ---- 💫 Modern & Aesthetic Hyprlock (Ubuntu Optimized) 💫 ---- */

# Sourcing colors (Pastikan file ini ada, kalau tidak ada, warna akan default ke putih)
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
    grace = 2
    hide_cursor = true
    no_fade_in = false
    immediate_render = true
}

background {
    monitor =
    # Mengambil wallpaper aktif. Jika tidak muncul, ganti path ke file .jpg/.png langsung
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    
    color = rgb(20, 20, 20) # Warna dasar saat wallpaper loading

    # Efek blur halus ala iOS
    blur_size = 5
    blur_passes = 3 
    noise = 0.0117
    contrast = 1.0
    brightness = 0.5 # Membuat background redup agar teks lebih kontras
    vibrancy = 0.2
}

# JAM (Tengah Atas)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 140
    font_family = Inter ExtraBold
    position = 0, 180
    halign = center
    valign = center
    
}

# TANGGAL (Tengah)
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = rgba(255, 255, 255, 0.7)
    font_size = 20
    font_family = Montserrat Light
    position = 0, 80
    halign = center
    valign = center
}

# GREETING USER (Tengah Bawah Jam)
label {
    monitor =
    text = Halo, $USER
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# INPUT FIELD (Password Box)
input-field {
    monitor =
    size = 260, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.4) # Efek transparan gelap
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text = <i><span foreground="##ffffff66">Enter Password</span></i>
    hide_input = false
    rounding = 20
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34) 
    font_family = Inter
    position = 0, -100
    halign = center
    valign = center
}

# STATUS BAR (Kiri Bawah - Info Baterai)
label {
    monitor =
    text = cmd[update:1000] echo "<b>$($HOME/.config/hypr/scripts/Battery.sh)</b>"
    color = rgba(255, 255, 255, 0.5)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 30, 20
    halign = left
    valign = bottom
}

# UPTIME (Kanan Bawah)
label {
    monitor =
    text = cmd[update:60000] echo "System Active: $(uptime -p | sed 's/up //')"
    color = rgba(255, 255, 255, 0.4)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = -30, 20
    halign = right
    valign = bottom
}